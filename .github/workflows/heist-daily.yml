name: The heist, nightly

# Builds and sends the day's issue, then commits it to the public archive.
# Manual runs: Actions tab -> "The heist, nightly" -> Run workflow.
#
# Required repo secrets:
#   GMAIL_USER          - sending Gmail address
#   GMAIL_APP_PASSWORD  - app password for that Gmail
# Optional secrets:
#   PIGEON_SHEET_ID     - subscriber sheet (without it, sends to GMAIL_USER only)
#   GOOGLE_CREDS_JSON   - service account json (needed with PIGEON_SHEET_ID)
#   SI_API_KEY          - unlocks the Smithsonian museums
#   HARVARD_API_KEY     - unlocks the Harvard Art Museums

on:
  schedule:
    # GitHub cron queues under load and popular times run late (the 11:30
    # slot once fired at 14:05). Odd minute + earlier hour biases delivery
    # toward 7-8am Charleston even when the queue is slow.
    - cron: '47 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account credentials
        run: |
          if [ -n "$GOOGLE_CREDS_JSON" ]; then
            printf '%s' "$GOOGLE_CREDS_JSON" > google-creds.json
          fi
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}

      # Order matters: Apple Mail prefetches images at delivery time, so any
      # self-hosted art must be live on Pages BEFORE the email goes out.
      - name: Build tonight's heist
        env:
          SI_API_KEY: ${{ secrets.SI_API_KEY }}
          HARVARD_API_KEY: ${{ secrets.HARVARD_API_KEY }}
        run: python -m heist.build_issue --prepare

      - name: Publish the archive and any self-hosted art
        run: |
          git config user.name "pigeon"
          git config user.email "actions@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "heist: $(date -u +%F)"
          git push

      - name: Wait for the art to deploy
        run: python -m heist.build_issue --wait-live

      - name: Send
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PIGEON_SHEET_ID: ${{ secrets.PIGEON_SHEET_ID }}
          GOOGLE_CREDS_PATH: ./google-creds.json
        run: python -m heist.build_issue --send-outbox
